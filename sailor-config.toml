# Multi-set config for hw2font — "Sailor" handwriting.
# Each [[sets]] entry is a scan set (2 pages per set).
# The font will cycle between sets using contextual alternates (calt).
#
# Per-glyph overrides (under each set):
#   scale  — multiplier on the glyph's size (e.g. 0.8 = 80%)
#   nudge  — vertical shift in pixels (positive = up, negative = down)
#   hshift — horizontal shift in pixels (negative = left, positive = right)
#
# Override keys:
#   Letters:    overrides.a.scale = 0.9
#   Digits:     overrides."0".scale = 0.85      # quote digits
#   Symbols:    overrides."!".nudge = -5         # quote punctuation/symbols
#               overrides."@".scale = 0.7
#               overrides."?".nudge = 3
#   Ligatures:  overrides.th.scale = 1.1         # multi-char key = ligature
#               overrides.qu.nudge = -8
#   Special:    overrides."♥".scale = 0.9        # Unicode chars in quotes
#               overrides."☺".nudge = -3

name = "EWJ Handwriting Sailor"

# Kerning (font units, negative = tighter).
# Shape-based classes for uppercase → lowercase:
#   overhang_lc = T, F, V, W, Y  (default: -120)
#   round_lc    = C, G, O, Q, D  (default: -60)
#   straight_lc = H, I, M, N, …  (default: -40)
#   open_lc     = A, J, P, S, …  (default: -50)
# Blanket per-glyph kerning:
#   right.x = -40                # x followed by anything
#   left.o = -20                 # anything followed by o
# Per-pair overrides (highest priority):
#   pairs.Ta = -150              # override just T→a
#
# Global [kern] applies to all sets. Per-set kern (under [[sets]])
# adds to / overrides the global values for that set's glyphs only.
[kern]
overhang_lc = -120
round_lc = -60
straight_lc = -40
open_lc = -50
right.x = -40
# left.o = -20
# pairs.Ta = -150

[[sets]]
scans = ["images/sailor1.png", "images/sailor2.png"]
# Borrow glyphs from another set (value = set index to borrow from):
#   borrow."-" = 1               # use hyphen from set 1
# Per-glyph overrides for this set:
#   overrides.a.scale = 0.9
#   overrides.".".nudge = 30
kern.right.x = -30
overrides.j.nudge = 20
kern.left.y = -50
kern.left.g = -50

[[sets]]
scans = ["images/sailor-alt1.png", "images/sailor-alt2.png"]
# Per-glyph overrides for the alternate set:
#   overrides.a.scale = 0.8
# Per-set kerning (only affects this set's alternate glyphs):
#   kern.right.x = -60
#   kern.pairs.xa = -60
overrides.".".nudge = 20
kern.left.g = -50
kern.left.y = -50
overrides.F.nudge = -20
overrides.E.nudge = -20
overrides.j.nudge = 30
