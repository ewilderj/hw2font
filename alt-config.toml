# Multi-set config for hw2font.
# Each [[sets]] entry is a scan set (2 pages per set).
# The font will cycle between sets using contextual alternates (calt).

name = "Edd Handwriting"

[[sets]]
scans = ["extract1.png", "extract2.png"]

[[sets]]
scans = ["alt1.png", "alt2.png"]
overrides.a.scale = 0.8
overrides.i.scale = 0.9
overrides.i.nudge = 10
